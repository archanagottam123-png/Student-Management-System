kind = "web"
previewPath = "/"
title = "Student Management System"
version = "1.0.0"
id = "artifacts/student-management"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18301

[services.development]
run = "pnpm --filter @workspace/student-management run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-management", "run", "build" ]
publicDir = "artifacts/student-management/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18301"
BASE_PATH = "/"
